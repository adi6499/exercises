<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Fat Loss System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for sleek weight trend -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app-container">
    <!-- Header with Date and Streak -->
    <header style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: baseline;">
        <div>
            <div class="subtitle" id="current-date">MONDAY, APRIL 21</div>
            <h1>Fat Loss</h1>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <div id="cloud-status" class="cloud-status" title="Cloud Sync Active">☁️</div>
            <div class="streak-badge">
                🔥 <span id="streak-count">0</span>
            </div>
        </div>
    </header>

    <!-- TAB 1: DASHBOARD -->
    <main id="view-dashboard" class="view-panel">
        <div class="card">
            <div class="subtitle">CALORIE BURN GOAL</div>
            <div style="display: flex; align-items: baseline; gap: 8px; margin-top: 5px;">
                <h1 id="burned-calories">0</h1>
                <span style="color: var(--text-secondary); font-weight: 600;">/ <span id="target-burn">300</span> KCAL</span>
            </div>
            <div class="progress-container">
                <div id="burn-progress" class="progress-fill"></div>
            </div>
            <div id="burn-remaining" style="font-size: 14px; font-weight: 600; color: var(--accent-orange);">
                300 kcal remaining
            </div>
            <div class="insight-box" id="daily-insight">
                Setting up your plan for today...
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Today's Workout</h2>
                <div class="subtitle" id="workout-rounds">1 ROUND ONLY</div>
            </div>
            <div id="workout-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </main>

    <!-- TAB 2: INTAKE -->
    <main id="view-intake" class="view-panel hidden">
        <div class="card">
            <h2>Add Meal</h2>
            <div style="margin-top: 15px;">
                <input type="text" id="food-name" placeholder="e.g. Grilled Chicken">
                <input type="number" id="food-cals" placeholder="Calories (kcal)">
                <button class="btn btn-primary" id="add-meal-btn">Add to Logs</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;">
                <div class="subtitle">TOTAL INTAKE</div>
                <div style="font-weight: 700;" id="intake-status">0 / 1600 kcal</div>
            </div>
            <div class="progress-container">
                <div id="intake-progress" class="progress-fill"></div>
            </div>
            <div id="intake-list" style="margin-top: 10px;">
                <!-- Meals injected here -->
            </div>
        </div>
    </main>

    <!-- TAB 3: PROGRESS -->
    <main id="view-progress" class="view-panel hidden">
        <div class="card">
            <h2>Track Weight</h2>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="number" id="weight-input" placeholder="77.0" step="0.1" style="margin-bottom: 0;">
                <button class="btn btn-primary" id="save-weight-btn" style="width: auto; padding: 0 25px;">Log</button>
            </div>
            <div style="margin-top: 15px;" id="weight-trend-text">
                No logs recorded this week.
            </div>
            <div class="chart-container">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Profile Settings</h2>
            <div class="settings-group" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label class="subtitle">Target Wt (kg)</label>
                    <input type="number" id="set-target-weight" value="74">
                </div>
                <div>
                    <label class="subtitle">Daily Cals</label>
                    <input type="number" id="set-calorie-limit" value="1600">
                </div>
                <div>
                    <label class="subtitle">Height (cm)</label>
                    <input type="number" id="set-height" value="171">
                </div>
                <div>
                    <label class="subtitle">Age</label>
                    <input type="number" id="set-age" value="27">
                </div>
            </div>
            <button class="btn btn-secondary" id="save-settings-btn" style="margin-top: 10px;">Save Profile</button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav>
        <div class="nav-item active" id="nav-dashboard">
            <svg fill="currentColor" width="22" height="22" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </div>
        <div class="nav-item" id="nav-intake">
            <svg fill="currentColor" width="22" height="22" viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
            <span>Diet</span>
        </div>
        <div class="nav-item" id="nav-progress">
            <svg fill="currentColor" width="22" height="22" viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
            <span>Track</span>
        </div>
    </nav>
</div>

<script src="app.js"></script>
</body>
</html>
